name: Env Selector WF
on:
  workflow_dispatch:
    inputs:
      env_sel:
        description: Select the Environment
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  secret_job:
    environment: ${{ inputs.env_sel }}
    runs-on: ubuntu-latest

    steps:
      - name: print everything
        run: echo ${{ secrets.SECRET }}
        run: echo ${{ vars.TEST_VAR }}
        

